<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2500" viewBox="0 0 2000 2500">
  <defs>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24313a; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58707d; }
      .box { stroke: #2d3d46; stroke-width: 2.5; rx: 24; ry: 24; }
      .text { font: 600 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24313a; text-anchor: middle; }
      .small { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24313a; text-anchor: middle; }
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58707d; text-anchor: middle; }
      .line { stroke: #58707d; stroke-width: 4; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58707d"/>
    </marker>
  </defs>

  <rect width="2000" height="2500" fill="#f6f3eb"/>
  <text x="1000" y="70" class="title">Weather Update Message Flow</text>
  <text x="1000" y="105" class="subtitle">High-level view of snapshot reuse, batching, queueing, and failure handling</text>

  <rect x="700" y="150" width="600" height="86" class="box" fill="#f2cd8f"/>
  <text x="1000" y="205" class="text">Trigger</text>

  <rect x="600" y="300" width="800" height="110" class="box" fill="#dce8e0"/>
  <text x="1000" y="365" class="text">How is the update started?</text>

  <rect x="120" y="500" width="720" height="110" class="box" fill="#d4e6f1"/>
  <text x="480" y="555" class="text">Scheduled update</text>
  <text x="480" y="587" class="small">Identify recipients for this update</text>

  <rect x="1160" y="500" width="720" height="110" class="box" fill="#d4e6f1"/>
  <text x="1520" y="555" class="text">Live request</text>
  <text x="1520" y="587" class="small">Receive '/weather' request</text>

  <rect x="580" y="690" width="840" height="110" class="box" fill="#efe8cf"/>
  <text x="1000" y="755" class="text">Check for a recent weather snapshot</text>

  <rect x="600" y="880" width="800" height="110" class="box" fill="#dce8e0"/>
  <text x="1000" y="945" class="text">Recent snapshot available?</text>

  <rect x="90" y="1080" width="720" height="110" class="box" fill="#d4eed4"/>
  <text x="450" y="1145" class="text">Reuse recent weather data</text>

  <rect x="1190" y="1080" width="720" height="110" class="box" fill="#f5dcb6"/>
  <text x="1550" y="1145" class="text">Get latest weather data</text>

  <rect x="1190" y="1260" width="720" height="110" class="box" fill="#dce8e0"/>
  <text x="1550" y="1325" class="text">Data retrieval successful?</text>

  <rect x="1190" y="1440" width="720" height="110" class="box" fill="#f3e5c5"/>
  <text x="1550" y="1495" class="text">Retry automatically</text>
  <text x="1550" y="1527" class="small">For temporary data source issues</text>

  <rect x="1190" y="1620" width="720" height="110" class="box" fill="#dce8e0"/>
  <text x="1550" y="1685" class="text">Data retrieval successful after retry?</text>

  <rect x="1190" y="1800" width="720" height="110" class="box" fill="#f2d3cf"/>
  <text x="1550" y="1865" class="text">Send failure notice</text>

  <rect x="640" y="1800" width="720" height="110" class="box" fill="#d4eed4"/>
  <text x="1000" y="1865" class="text">Save snapshot for reuse</text>

  <rect x="580" y="1980" width="840" height="110" class="box" fill="#efe8cf"/>
  <text x="1000" y="2045" class="text">Prepare weather message</text>

  <rect x="460" y="2160" width="1080" height="150" class="box" fill="#d4e6f1"/>
  <text x="1000" y="2215" class="text">Process recipients in controlled batches</text>
  <text x="1000" y="2250" class="small">Up to 20 messages per second</text>
  <text x="1000" y="2285" class="small">5 messages handled at the same time</text>

  <rect x="580" y="2380" width="840" height="110" class="box" fill="#efe8cf"/>
  <text x="1000" y="2445" class="text">Place messages in managed delivery queue</text>

  <line x1="1000" y1="236" x2="1000" y2="300" class="line" marker-end="url(#arrow)"/>

  <path d="M 1000 410 L 1000 455 L 480 455 L 480 500" class="line" marker-end="url(#arrow)"/>
  <text x="660" y="440" class="label">Scheduled update</text>
  <path d="M 1000 410 L 1000 455 L 1520 455 L 1520 500" class="line" marker-end="url(#arrow)"/>
  <text x="1340" y="440" class="label">Live request</text>

  <path d="M 480 610 L 480 650 L 1000 650 L 1000 690" class="line" marker-end="url(#arrow)"/>
  <path d="M 1520 610 L 1520 650 L 1000 650 L 1000 690" class="line" marker-end="url(#arrow)"/>
  <line x1="1000" y1="800" x2="1000" y2="880" class="line" marker-end="url(#arrow)"/>

  <path d="M 1000 990 L 1000 1035 L 450 1035 L 450 1080" class="line" marker-end="url(#arrow)"/>
  <text x="720" y="1020" class="label">Yes</text>
  <path d="M 1000 990 L 1000 1035 L 1550 1035 L 1550 1080" class="line" marker-end="url(#arrow)"/>
  <text x="1280" y="1020" class="label">No</text>

  <line x1="1550" y1="1190" x2="1550" y2="1260" class="line" marker-end="url(#arrow)"/>
  <path d="M 1190 1315 L 1000 1315 L 1000 1800" class="line" marker-end="url(#arrow)"/>
  <text x="1110" y="1295" class="label">Yes</text>
  <line x1="1550" y1="1370" x2="1550" y2="1440" class="line" marker-end="url(#arrow)"/>
  <text x="1610" y="1405" class="label">No</text>
  <line x1="1550" y1="1550" x2="1550" y2="1620" class="line" marker-end="url(#arrow)"/>
  <path d="M 1190 1675 L 1000 1675 L 1000 1800" class="line" marker-end="url(#arrow)"/>
  <text x="1110" y="1655" class="label">Yes</text>
  <line x1="1550" y1="1730" x2="1550" y2="1800" class="line" marker-end="url(#arrow)"/>
  <text x="1610" y="1765" class="label">No</text>

  <path d="M 450 1190 L 450 1935 L 1000 1935 L 1000 1980" class="line" marker-end="url(#arrow)"/>
  <line x1="1000" y1="1910" x2="1000" y2="1980" class="line" marker-end="url(#arrow)"/>
  <line x1="1000" y1="2090" x2="1000" y2="2160" class="line" marker-end="url(#arrow)"/>
  <line x1="1000" y1="2310" x2="1000" y2="2380" class="line" marker-end="url(#arrow)"/>
</svg>
